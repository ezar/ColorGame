<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Color Match</title>
  <meta name="theme-color" content="#111827"/>
  <meta name="description" content="Train your color perception"/>
  <link rel="icon" href="%BASE_URL%favicon.ico" sizes="48x48"/>
  <link rel="icon" href="%BASE_URL%icon.svg" sizes="any" type="image/svg+xml"/>
  <link rel="apple-touch-icon" href="%BASE_URL%apple-touch-icon-180x180.png"/>
  <link rel="manifest" href="%BASE_URL%manifest.webmanifest"/>
</head>
<body>

  <div class="top-bar">
    <button class="ctrl-btn" id="soundBtn">🔊</button>
    <button class="ctrl-btn" id="themeBtn">☽</button>
    <button class="ctrl-btn" id="langBtn">ES</button>
    <button class="ctrl-btn" id="diffBtn">EASY</button>
    <button class="ctrl-btn" id="dailyBtn">DAILY</button>
    <button class="ctrl-btn" id="taBtn">TIME</button>
  </div>

  <main>

    <h1>Color Match</h1>

    <div class="info-bar" id="infoBar">
      <span id="roundLabel">Round 1 of 5</span>
      <span id="avgScore">Avg: —</span>
    </div>

    <div class="swatches" id="swatches">
      <div class="swatch-group">
        <div class="swatch-wrap">
          <div class="swatch" id="targetSwatch"></div>
          <div class="countdown-overlay" id="hideCountdown" hidden></div>
        </div>
        <div class="swatch-label" id="targetLabel">Target</div>
      </div>

      <div class="score-display" id="scoreDisplay">
        <div class="score-label" id="accuracyLabel">Accuracy</div>
        <div class="score-number" id="scoreNumber">—</div>
        <div class="score-bar">
          <div class="score-bar-fill" id="scoreBarFill"></div>
        </div>
        <div class="color-name" id="colorName"></div>
      </div>

      <div class="swatch-group">
        <div class="swatch" id="pickedSwatch"></div>
        <div class="swatch-label" id="pickedLabel">Your color</div>
      </div>
    </div>

    <canvas id="wheelCanvas" width="340" height="340"></canvas>

    <div class="round-timer-bar"><div class="round-timer-fill" id="roundTimerFill"></div></div>

    <button class="btn primary" id="actionBtn">Confirm</button>

    <div id="finalScreen">
      <div class="score-label" id="finalScoreLabel">Final score</div>
      <div class="grade" id="finalGrade"></div>
      <div class="final-avg" id="finalAvg"></div>
      <div class="final-meta">
        <span class="final-best" id="finalBest"></span>
        <span class="final-streak" id="finalStreak"></span>
      </div>
      <div class="final-palette" id="finalPalette"></div>

      <div class="history-wrap" id="historyWrap">
        <div class="history-chart" id="historyChart"></div>
        <div class="score-label" id="historyLabel">Last games</div>
      </div>
      <div style="display:flex;gap:12px;margin-top:8px">
        <button class="btn primary" id="restartBtn">Play again</button>
        <button class="btn" id="shareBtn">Share</button>
      </div>
    </div>

  </main>

  <footer id="footer"></footer>

  <div id="dailyResult" class="tutorial-overlay" hidden>
    <div class="daily-card">
      <div class="daily-day" id="drDayLabel"></div>
      <div class="daily-grade" id="drGrade"></div>
      <div class="daily-score" id="drAvg"></div>
      <div class="daily-palette" id="drPalette"></div>
      <div class="daily-actions">
        <button class="btn primary" id="drShareBtn"></button>
        <button class="btn" id="drCloseBtn"></button>
      </div>
    </div>
  </div>

  <div id="tutorial" class="tutorial-overlay" hidden>
    <div class="tutorial-card">
      <div class="tutorial-title" id="tutTitle">How to play</div>
      <ol class="tutorial-steps">
        <li id="tut1">Tap the wheel to pick a color</li>
        <li id="tut2">Match the target color as closely as you can</li>
        <li id="tut3">Confirm before the timer runs out</li>
      </ol>
      <button class="btn primary" id="tutBtn">Got it</button>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
